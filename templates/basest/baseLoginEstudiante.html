{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EducaPlus</title>
    <link rel="icon" href="{% static 'images/icon.jpg' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/navbar.css' %}">
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light navbar-personalizado">
    <div class="container-fluid d-flex justify-content-between">
        <div>
            <a class="navbar-brand" href="/indexLog/">Home</a>
        </div>
        <form class="d-flex" action="/search" method="get">
            <input class="form-control me-2 custom-search-bar" type="search" name="q" placeholder="Buscar..."
                   aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>
        <div>
            <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="/cursosEstudiante/">Mis cursos</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="{% static 'images/person-circle.svg' %}" alt="User Icon" width="25" height="25"
                             class="d-inline-block align-text-top">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                        <li><button class="dropdown-item text-dark">Perfil</button></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item text-dark" href="/logout">Cerrar sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<div style="display: block; flex-wrap: wrap;">
    <button>salir</button>
    <div style="flex: 1; margin-right: 1em;">
        <div>
            <img src="/../perfil.jpg" />
        </div>
        
      <br>
      <input type="file" id="profilePicture" name="profilePicture"><br>
      <label for="firstName">Nombre*:</label><br>
      <input type="text" id="firstName" name="firstName" value="Juan Carlos" required><br>
      <label for="lastName">Apellidos*:</label><br>
      <input type="text" id="lastName" name="lastName" value="García Martínez" required><br>
      <label for="dob">Fecha de nacimiento*:</label><br>
      <input type="date" id="dob" name="dob" required><br>
    </div>
    <div style="flex: 2;">
      <label for="specialization">Area de especializacion*:</label><br>
      <select id="specialization" name="specialization" required>
        <option value="Economia" selected>Economia</option>
        <option value="Tecnologia">Tecnologia</option>
        <option value="Humanidades">Humanidades</option>
        <option value="Medicina">Medicina</option>
        <option value="Ciencias Juridicas">Ciencias Juridicas</option>
        <option value="Arquitectura">Arquitectura</option>
      </select><br>
      <input type="submit" value="Enviar">
    </div>
  </div>
</body>
</html>
