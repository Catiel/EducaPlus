{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EducaPlus</title>
    <link rel="icon" href="{% static 'images/icon.jpg' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/navbar.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light navbar-personalizado">
    <div class="container-fluid d-flex justify-content-between">
        <div>
            <a class="navbar-brand" href="/indexLog/">Home</a>
        </div>
        <form class="d-flex" action="/search" method="get">
            <input class="form-control me-2 custom-search-bar" type="search" name="q" placeholder="Buscar..."
                   aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>
        <div>
            <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="/cursosEstudiante/">Mis cursos</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="{% static 'images/person-circle.svg' %}" alt="User Icon" width="25" height="25"
                             class="d-inline-block align-text-top">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item text-dark" href="#" data-bs-toggle="modal" data-bs-target="#dialogo1">Ver perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-dark" href="/logout">Cerrar sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Editar datos personales del estudiante-->
<div class="modal fade" id="dialogo1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header text-center">
                <h5 class="modal-title w-100" id="exModalLabel">Ver perfil</h5>
                <button type="button" class="btn-close" name="button" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="container-fluid">
                    <form>
                        <div class="row mb-3">
                            <label class="col-3 col-form-label visually-hidden">
                                DATOS PERSONALES
                            </label>
                            <div class="col-9 col-md-7 offset-md-0 d-flex align-items-center justify-content-end">    <!-- Ajusta el tamaño de la columna y añade justify-content-end -->
                                <div class="profile-icon-container position-relative">
                                    <i class="bi bi-person-circle bi-lg icono-perfil" style="font-size: 100px;"></i>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ estudiante.nombre }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="apellido" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="apellido" name="apellido" value="{{ estudiante.apellido }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="fecha_nacimiento" class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" value="{{ estudiante.fecha_nacimiento }}" required>
                        </div>      

                        <div class="row">
                            <div class="col text-center">
                                <button type="submit" class="btn btn-primary">
                                     Guardar cambios
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
        
{% block content %}{% endblock %}
<!-- Agrega este script al final de tu HTML -->
<script>
    $(document).ready(function () {
        $('#dialogo1').on('show.bs.modal', function (event) {
            var modal = $(this);
            $.ajax({
                type: 'GET',
                url: '/obtener-datos-usuario/',  // Verifica que esta URL sea correcta
                success: function (data) {
                    console.log(data);  // Debugging para verificar la estructura de los datos
                    modal.find('#nombre').val(data.nombre);
                    modal.find('#apellido').val(data.apellido);
                    modal.find('#fecha_nacimiento').val(data.fecha_nacimiento);
                },
                error: function (xhr, errmsg, err) {
                    console.log(xhr.status + ": " + xhr.responseText);  // Manejo de errores
                }
            });
        });
    });
</script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>


</body>
</html>
