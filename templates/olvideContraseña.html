<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de Contraseña</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
            margin: 0;
        }

        .container {
            border-radius: 18px;
            background: linear-gradient(145deg, #acbaec, #52489d);
            box-shadow: 7px 7px 15px #2c45f8,
            -7px -7px 15px #53648a;
            width: 30vw;
            height: 30vh;
            overflow: auto;
            padding: 20px;
        }

        h2 {
            font-size: 1.5em;
            margin-bottom: 1em;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: .5em;
            color: #333;
            font-size: 1.2em;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 10px 50px 10px 10px;
            margin-bottom: 1em;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1.2em;
        }

        .eye-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-100%);
            cursor: pointer;
            line-height: 1;
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2em;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cambiar contraseña</h2>
    <form>
        <div class="mb-4">
            <label for="new-password">Contraseña nueva*</label>
            <div class="password-container">
                <input id="new-password" type="password" required>
                <span onclick="togglePasswordVisibility('new-password')" class="eye-icon">🔑</span>
            </div>
        </div>
        <div class="mb-4">
            <label for="confirm-password">Confirmar contraseña*</label>
            <div class="password-container">
                <input id="confirm-password" type="password" required>
                <span onclick="togglePasswordVisibility('confirm-password')" class="eye-icon">🔑</span>
            </div>
        </div>
        <button type="submit" class="btn">Confirmar cambio</button>
    </form>
</div>

<script>
    function togglePasswordVisibility(id) {
        var passwordInput = document.getElementById(id);
        var type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        // Cambia el ícono dependiendo del estado de visibilidad
        var eyeIcon = passwordInput.nextElementSibling;
        eyeIcon.textContent = type === 'password' ? '🔑' : '🚫';
    }
</script>

</body>
</html>
