{% extends 'basest/baseCrearCurso.html' %}
{% load static %}
{% block content %}
    <div class="row">
        <div class="col-7 border m-5">
            <form id="courseForm" method="POST" action="{% url 'crear_curso' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="courseName" class="form-label">Nombre del curso</label>
                    <input type="text" class="form-control" id="courseName" name="courseName" required minlength="20"
                           maxlength="50">
                </div>
                <div class="mb-3">
                    <label for="courseDescription" class="form-label">Descripción del curso</label>
                    <textarea class="form-control" id="courseDescription" name="courseDescription" required
                              maxlength="1404"></textarea>
                </div>
                <div class="mb-3">
                    <label for="courseCategory" class="form-label">Categoría del curso</label>
                    <select class="form-select" id="courseCategory" name="courseCategory" required>
                        <option selected disabled>Selecciona una categoría</option>
                        <option value="Economia">Economia</option>
                        <option value="Tecnologia">Tecnologia</option>
                        <option value="Humanidades">Humanidades</option>
                        <option value="Medicina">Medicina</option>
                        <option value="Ciencias Juridicas">Ciencias Jurídicas</option>
                        <option value="Arquitecura">Arquitectura</option>
                        <!-- Agrega más opciones según sea necesario -->
                    </select>
                </div>
                <div class="mb-3">
                    <label for="courseDuration" class="form-label">Duración del curso</label>
                    <input type="number" class="form-control" id="courseDuration" name="courseDuration" required>
                </div>
                <div class="mb-3">
                    <label for="courseDifficulty" class="form-label">Dificultad del curso</label>
                    <select class="form-select" id="courseDifficulty" name="courseDifficulty" required>
                        <option selected disabled>Selecciona una dificultad</option>
                        <option value="Principiante">Principiante</option>
                        <option value="intermedio">Intermedio</option>
                        <option value="Avanzado">Avanzado</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="coursePayment" class="form-label">Tipo de curso</label>
                    <select class="form-select" id="coursePayment" name="coursePayment" required
                            onchange="checkPayment(this)">
                        <option selected disabled>Selecciona un tipo</option>
                        <option value="gratis">Gratis</option>
                        <option value="pago">De pago</option>
                    </select>
                </div>
                <div class="mb-3" id="courseCostDiv" style="display: none;">
                    <label for="courseCost" class="form-label">Costo del curso (en dólares)</label>
                    <input type="number" class="form-control" id="courseCost" name="courseCost">
                </div>
            </form>
        </div>
        <div class="col-3 border m-5"></div>
    </div>
    <script>
        function checkPayment(select) {
            let costDiv = document.getElementById('courseCostDiv');
            if (select.value === 'pago') {
                costDiv.style.display = 'block';
                document.getElementById('courseCost').required = true;
            } else {
                costDiv.style.display = 'none';
                document.getElementById('courseCost').required = false;
            }
        }

        let textarea = document.getElementById('courseDescription');
        textarea.addEventListener('input', autoResize, false);

        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }
    </script>
{% endblock %}
