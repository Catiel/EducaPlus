<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña</title>
    <style>
        .centered-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #020202;
            padding: 15px;
            width: 310px;
        }
        .message {
            margin-top: 20px;
            
        }
    </style>
</head>
<body>
    <div class="centered-box">
        <h2>¿Has olvidado tu contraseña?</h2>
        <form method="post" action="{% url 'forgot_password' %}">
            {% csrf_token %}
            <label for="email" class="label required">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            Se enviará un mensaje a este email para restablecer su contraseña
        <div class="message">
            {% if message %}
                {{ message }}
            {% endif %}
        </div>

            <input type="submit" value="Enviar">
        </form>
    </div>
</body>
</html>
