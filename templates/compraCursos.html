{% extends 'basest/baseLoginCompra.html' %}
{% load static %}
{% block content %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/compraCursos.css' %}">
    <script src="{% static 'js/compra.js' %}"></script>
    <div class="contenedor">
        <div class="detalles_curso">
            <h1> {{ curso.nombre }} </h1>
            <p>
                {{ curso.descripcion }}
            </p>
        </div>
        <div class="resumen_pago">
            <form class="small-form">
                <h2 id="tit">Checkout</h2>
                <div class="form-group" {% if curso.precio == 0 %}style="display: none;"{% endif %}>
                    <label for="cardName" class="required">Nombre del titular</label>
                    <input type="text" class="form-control" id="cardName"
                           placeholder="Nombre tal como aparece en la tarjeta" required minlength="2" maxlength="50">
                </div>
                <div class="form-group" {% if curso.precio == 0 %}style="display: none;"{% endif %}>
                    <label for="cardNumber" class="required">Número de tarjeta</label>
                    <input type="number" class="form-control" id="cardNumber" placeholder="Número de tarjeta" required
                           step="1">
                </div>
                <div class="form-row" {% if curso.precio == 0 %}style="display: none;"{% endif %}>
                    <div class="form-group col-6">
                        <label for="expiryDate" class="required">Fecha de vencimiento</label>
                        <input type="text" class="form-control" id="expiryDate" placeholder="MM/AA" required
                               pattern="(0[1-9]|1[0-2])\/[0-9]{2}">
                    </div>
                    <div class="form-group col-6">
                        <label for="cvv" class="required">CVV</label>
                        <input type="text" class="form-control" id="cvv" placeholder="CVV" required pattern="\d{3,4}"
                               maxlength="4">
                    </div>
                </div>
                <div class="resumen">
                    <h3>Resumen</h3>
                    <div class="resumen-item">
                        <span>Total</span>
                        <span class="total-amount price">
                            {% if curso.precio == 0 %}Gratis{% else %}${{ curso.precio }}{% endif %}
                        </span>
                    </div>
                </div>
                <div class="button-container">
                    <a href="{% url 'indexLog' %}" class="btn btn-primary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        {% if curso.precio == 0 %}Obtener gratis{% else %}Realizar pago{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
