<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EducaPlus</title>
    <style>
        :root {
            --blue-chill-50: #f2f9f9;
            --blue-chill-100: #ddeff0;
            --blue-chill-200: #bfe0e2;
            --blue-chill-300: #92cace;
            --blue-chill-400: #5faab1;
            --blue-chill-500: #438e96;
            --blue-chill-600: #3b757f;
            --blue-chill-700: #356169;
            --blue-chill-800: #325158;
            --blue-chill-900: #2d464c;
            --blue-chill-950: #1a2c32;
        }
        .course-card {
            width: 200px;
            border: 1px solid var(--blue-chill-500);
            margin: 10px;
            padding: 10px;
            background-color: var(--blue-chill-50);
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            background-color: var(--blue-chill-900);
            padding: 10px;
        }
        .navbar a {
            margin-right: 15px;
            color: var(--blue-chill-50);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">Inicio</a>
        <form action="/search" method="get">
            <input type="text" name="q" placeholder="Buscar...">
            <input type="submit" value="Buscar">
        </form>
        <a href="/profile">Perfil</a>
    </div>

    <h1 style="color: var(--blue-chill-500);">Categorias</h1>

    <details>
        <summary>Medicina</summary>
        <div class="course-card">
            <h2 style="color: var(--blue-chill-600);">Curso 1</h2>
            <p style="color: var(--blue-chill-700);">Descripción del curso 1</p>
            <p style="color: var(--blue-chill-700);">Instructor: Nombre del instructor</p>
            <p style="color: var(--blue-chill-700);">Precio: $100</p>
            <button style="background-color: var(--blue-chill-400); color: var(--blue-chill-50);">Comprar ahora</button>
        </div>
        <!-- Repite el div de course-card para cada curso que tengas en la categoría de Medicina -->
    </details>

    <!-- Repite el elemento details para cada categoría que tengas -->

</body>
</html>
